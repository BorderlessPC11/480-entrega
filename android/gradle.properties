# RAM nativa apertada (emulador + Windows): heap menor = mais espaço p/ compilação C2 e SO.
# Se o build for lento, suba de 1024m para 1536m/2048m com outros apps fechados.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8
org.gradle.daemon=true
# Menos carga de memória em paralelo (evita crash "daemon disappeared" no Windows)
org.gradle.parallel=false
org.gradle.workers.max=2
# Kotlin/AGP: daemon com heap modesto
kotlin.daemon.jvmargs=-Xmx512m
android.useAndroidX=true
